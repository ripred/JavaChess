name: Bug report
description: Report a reproducible bug.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. A minimal command, input, or reproduction is the fastest path to a fix.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include version or commit, operating system, Java version, and relevant dependency versions.
      placeholder: |
        Commit or release:
        OS:
        Java version:
        Dependencies:
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest command, input, configuration, or steps that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste error output, logs, screenshots, or observed behavior when useful.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues first.
          required: true
        - label: I reduced this to the smallest reproduction I can.
          required: false

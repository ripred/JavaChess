name: Feature request
description: Propose a feature, example, or documentation improvement.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is awkward or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, command, output, or documentation you want.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Mention platform, compatibility, dependency, performance, or packaging constraints.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried or ruled out?
